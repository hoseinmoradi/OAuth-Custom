server.port=8089

spring.application.name=oauth-authorization-server

# H2 (default)
spring.datasource.url=jdbc:h2:mem:oauthdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.initialization-mode=always
spring.datasource.continue-on-error=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.thymeleaf.cache=false

# MySQL (uncomment and disable H2 above when needed)
# spring.datasource.url=jdbc:mysql://localhost:3306/oauthdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# spring.datasource.username=root
# spring.datasource.password=root
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# JWT
oauth.jwt.signing-key=master-oauth-jwt-signing-key-change-me-in-production
oauth.token.access-token-validity-seconds=3600
oauth.token.refresh-token-validity-seconds=86400

# Login provider: local | remote
# local  = authenticate against users table
# remote = call external auth web service, then load local user profile/scopes
auth.login.mode=local
auth.login.remote.url=http://localhost:9090/api/auth/verify
auth.login.remote.connect-timeout-ms=3000
auth.login.remote.read-timeout-ms=5000

# Captcha
auth.captcha.enabled=true
auth.captcha.length=5
auth.captcha.ttl-seconds=300

logging.level.org.springframework.security=INFO
logging.level.com.master.oauth=DEBUG
