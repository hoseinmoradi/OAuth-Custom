<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>انتخاب Scope | Master OAuth</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="atmosphere" aria-hidden="true">
    <div class="orb orb-a"></div>
    <div class="orb orb-b"></div>
    <div class="grid-fade"></div>
</div>

<main class="shell">
    <section class="auth-card wide" data-animate="rise">
        <header class="auth-header">
            <p class="brand">Master OAuth</p>
            <h1>انتخاب سطح دسترسی</h1>
            <div th:if="${error == null}" class="meta-line">
                <span th:text="${username}">user</span>
                <span class="dot"></span>
                <span th:text="${clientId}">client</span>
            </div>
            <p class="lead" th:if="${error == null}">
                فقط scopeهایی که برای حساب شما مجاز است نمایش داده می‌شود. پس از تأیید، توکن فقط همین دسترسی‌ها را خواهد داشت.
            </p>
        </header>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <th:block th:if="${error == null}">
            <form th:action="@{/oauth/authorize}" method="post" class="form" id="consent-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" name="user_oauth_approval" value="true"/>

                <div class="scope-list">
                    <label class="scope-item" th:each="scope : ${scopes}">
                        <input type="checkbox"
                               th:name="'scope.' + ${scope.name}"
                               value="true"
                               checked="checked"/>
                        <span class="scope-body">
                            <span class="scope-title">
                                <strong th:text="${scope.displayName}">Scope</strong>
                                <code th:text="${scope.name}">name</code>
                            </span>
                            <small th:text="${scope.description}">desc</small>
                        </span>
                    </label>
                </div>

                <div th:if="${#lists.isEmpty(scopes)}" class="alert alert-error">
                    هیچ scope مشترکی بین کاربر و کلاینت وجود ندارد.
                </div>

                <div class="actions">
                    <button type="submit" class="btn-primary" th:disabled="${#lists.isEmpty(scopes)}">
                        تأیید و صدور دسترسی
                    </button>
                    <button type="submit" name="user_oauth_approval" value="false" class="btn-ghost">
                        رد کردن
                    </button>
                </div>
            </form>

            <p class="muted foot-note">
                معادل وب‌سرویس: <code>GET/POST /api/consent</code>
                — مدیریت توکن: <code>/api/tokens/me</code>
            </p>
        </th:block>
    </section>
</main>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
